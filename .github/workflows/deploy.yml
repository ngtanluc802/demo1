name: Build and Push Docker Image to Docker Hub

on:
  push:
    branches:
      - main

jobs:
  build-and-push:
    name: Build & Push Docker Image
    runs-on: ubuntu-latest

    steps:
      # Bước 1: Checkout mã nguồn
      - name: Checkout source code
        uses: actions/checkout@v4

      # Bước 2: Tạo tag cho image (dùng commit SHA ngắn + latest)
      - name: Generate Docker image tag
        id: tag
        run: |
          SHORT_SHA=$(echo ${{ github.sha }} | cut -c1-7)
          echo "tag=$SHORT_SHA" >> $GITHUB_OUTPUT
          echo "Image tag: $SHORT_SHA"

      # Bước 3: Đăng nhập vào Docker Hub bằng Secrets
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # Bước 4: Thiết lập Docker Buildx (hỗ trợ multi-platform)
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # Bước 5: Build và Push image lên Docker Hub (với 2 tags: SHA và latest)
      - name: Build and Push Docker Image
        uses: docker/build-push-action@v5
        with:
          context: .
          dockerfile: Dockerfile
          push: true
          tags: |
            nguyentanluc2280601870/demo1:${{ steps.tag.outputs.tag }}
            nguyentanluc2280601870/demo1:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # Bước 6: Thông báo kết quả
      - name: Summary
        run: |
          echo "✅ Docker image pushed successfully!"
          echo "🏷️  Tags:"
          echo "   - nguyentanluc2280601870/demo1:${{ steps.tag.outputs.tag }}"
          echo "   - nguyentanluc2280601870/demo1:latest"
