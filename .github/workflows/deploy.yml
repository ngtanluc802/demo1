name: Build, Push and Deploy

on:
  push:
    branches:
      - main

jobs:
  build-and-push:
    name: Build & Push Docker Image
    runs-on: ubuntu-latest

    steps:
      # Bước 1: Checkout mã nguồn
      - name: Checkout source code
        uses: actions/checkout@v4

      # Bước 2: Tạo tag cho image (dùng commit SHA ngắn + latest)
      - name: Generate Docker image tag
        id: tag
        run: |
          SHORT_SHA=$(echo ${{ github.sha }} | cut -c1-7)
          echo "tag=$SHORT_SHA" >> $GITHUB_OUTPUT
          echo "Image tag: $SHORT_SHA"

      # Bước 3: Đăng nhập vào Docker Hub bằng Secrets
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # Bước 4: Thiết lập Docker Buildx (hỗ trợ multi-platform)
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # Bước 5: Build và Push image lên Docker Hub (với 2 tags: SHA và latest)
      - name: Build and Push Docker Image
        uses: docker/build-push-action@v5
        with:
          context: .
          dockerfile: Dockerfile
          push: true
          tags: |
            nguyentanluc/demo1:${{ steps.tag.outputs.tag }}
            nguyentanluc/demo1:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # Bước 6: Gọi webhook ithutech để deploy container mới
      - name: Triển khai lên DevOps Classroom
        run: |
          REPO="nguyentanluc/demo1"
          CONTAINER_PORT=80
          RESPONSE=$(curl -sS -w "\n%{http_code}" -X POST "${{ secrets.DEPLOY_URL }}?repo=$REPO&tag=latest&slot=1&container_port=$CONTAINER_PORT&strict_container_port=0")
          BODY=$(echo "$RESPONSE" | sed '$d')
          CODE=$(echo "$RESPONSE" | tail -n1)
          echo "Webhook HTTP: $CODE"
          if [ "$CODE" -lt 200 ] || [ "$CODE" -ge 300 ]; then
            echo "Deploy thất bại. Xem chi tiết trong nhóm log bên dưới."
            echo "::group::Chi tiết webhook JSON"
            echo "$BODY" | python3 -m json.tool 2>/dev/null || echo "$BODY"
            echo "::endgroup::"
            exit 1
          fi
          echo "Deploy thành công."
          echo "::group::Chi tiết webhook JSON"
          echo "$BODY" | python3 -m json.tool 2>/dev/null || echo "$BODY"
          echo "::endgroup::"

      # Bước 7: Thông báo kết quả
      - name: Summary
        run: |
          echo "✅ Docker image pushed successfully!"
          echo "🏷️  Tags:"
          echo "   - nguyentanluc/demo1:${{ steps.tag.outputs.tag }}"
          echo "   - nguyentanluc/demo1:latest"
          echo "🚀 Deployed to: ithutech.io.vn (Slot S1 - Port 21329)"
